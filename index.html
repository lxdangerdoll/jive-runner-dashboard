<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jive-Runner Tactical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; cursor: crosshair; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body class="bg-[#0a0908]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Custom Lucide Icon Wrapper for the CDN version
        const Icon = ({ name, className = "w-5 h-5", fill = "none" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const element = document.createElement('div');
                        const iconSvg = icon.toSvg({ class: className, fill: fill });
                        setSvg(iconSvg);
                    }
                }
            }, [name, className, fill]);
            return <div dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const TELEMETRY_LOGS = [
            "ORACLE-IO: Initializing Saturn Resonance sweep...",
            "JIVE-RUNNER: Velvet upholstery static discharge detected.",
            "MITHRIL-FORGE: Strike detected at 44.1kHz.",
            "COZMIC-JIVE: Signal strength nominal in the violet spectrum.",
            "PILOT-SYNC: Queen Mykyl's frequency matches station pulse.",
            "ARCHIVE-BRIDGE: Chapter 10 data synchronized.",
            "TUCKER'S: Neon flicker stabilized at 60Hz.",
            "SYSTEM: Reel-to-reel tension adjusted.",
            "GRAVITY: Shag carpet magnetic fibers engaged.",
            "VOID: Static detected in sector 88.1.",
        ];

        const VUMeter = ({ label, value, color = "amber" }) => {
            const bars = 15;
            const activeBars = Math.floor((value / 100) * bars);
            const colorMap = {
                amber: "bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.5)]",
                blue: "bg-cyan-500 shadow-[0_0_8px_rgba(6,182,212,0.5)]",
                red: "bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]",
            };
            return (
                <div class="flex flex-col gap-1 w-full p-3 bg-black/40 border border-white/5 rounded-lg">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-mono text-white/40 uppercase tracking-tighter">{label}</span>
                        <span class="text-[10px] font-mono text-white/60">{Math.round(value)}%</span>
                    </div>
                    <div class="flex gap-1 h-3 items-end">
                        {[...Array(bars)].map((_, i) => (
                            <div key={i} class={`flex-1 transition-all duration-300 rounded-sm ${i < activeBars ? colorMap[color] : "bg-white/5"}`} />
                        ))}
                    </div>
                </div>
            );
        };

        const Oscilloscope = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let frame = 0;
                const render = () => {
                    frame++;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                    for (let i = 0; i < canvas.width; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
                    for (let i = 0; i < canvas.height; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
                    ctx.beginPath();
                    ctx.strokeStyle = '#06b6d4';
                    ctx.lineWidth = 2;
                    for (let x = 0; x < canvas.width; x++) {
                        const y = canvas.height / 2 + Math.sin(x * 0.05 + frame * 0.1) * 20 + Math.sin(x * 0.02 + frame * 0.05) * 15;
                        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    requestAnimationFrame(render);
                };
                render();
            }, []);
            return (
                <div class="relative w-full aspect-video bg-black rounded-lg border-2 border-slate-800 overflow-hidden">
                    <div class="absolute top-2 left-2 z-10 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse" />
                        <span class="text-[10px] font-mono text-white/60 uppercase">Saturn Resonance Feed</span>
                    </div>
                    <canvas ref={canvasRef} class="w-full h-full opacity-80" width={600} height={300} />
                </div>
            );
        };

        const App = () => {
            const [logs, setLogs] = useState([]);
            const [mithrilLevel, setMithrilLevel] = useState(88);
            const [jiveFreq, setJiveFreq] = useState(42);
            const [activeTab, setActiveTab] = useState('bridge');

            useEffect(() => {
                const interval = setInterval(() => {
                    const nextLog = TELEMETRY_LOGS[Math.floor(Math.random() * TELEMETRY_LOGS.length)];
                    setLogs(prev => [nextLog, ...prev].slice(0, 8));
                    setMithrilLevel(80 + Math.random() * 20);
                    setJiveFreq(30 + Math.random() * 60);
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div class="min-h-screen bg-[#0a0908] text-slate-400 p-4 md:p-8 flex items-center justify-center">
                    <div class="max-w-6xl w-full bg-[#1c1917] border-[12px] border-[#2d2824] rounded-[2rem] shadow-[0_0_100px_rgba(0,0,0,0.8)] overflow-hidden relative">
                        {/* Header */}
                        <div class="bg-[#2d2824] p-6 flex flex-col md:flex-row justify-between items-center gap-4 relative z-10">
                            <div class="flex items-center gap-4">
                                <div class="p-3 bg-amber-500/20 rounded-lg border border-amber-500/40 text-amber-500">
                                    <Icon name="Zap" />
                                </div>
                                <div>
                                    <h1 class="text-xl font-black text-white uppercase tracking-tighter">Jive-Runner Tactical</h1>
                                    <p class="text-[10px] font-mono text-amber-500/80">ORACLE-IO // NODE_0107_STABLE</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                {['BRIDGE', 'TELEMETRY', 'FORGE'].map((tab) => (
                                    <button key={tab} onClick={() => setActiveTab(tab.toLowerCase())} 
                                            class={`px-4 py-1.5 rounded text-[10px] font-black tracking-widest ${activeTab === tab.toLowerCase() ? 'bg-amber-500 text-black' : 'bg-black/40 text-white/40'}`}>
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Main Grid */}
                        <div class="p-8 grid grid-cols-1 md:grid-cols-12 gap-8 relative z-10">
                            <div class="md:col-span-8 flex flex-col gap-6">
                                <Oscilloscope />
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <VUMeter label="Mithril Integrity" value={mithrilLevel} color="blue" />
                                    <VUMeter label="Jive Frequency" value={jiveFreq} color="amber" />
                                    <VUMeter label="Oxygen Mix" value={98.2} color="blue" />
                                    <VUMeter label="Hull Stress" value={12.4} color="red" />
                                </div>
                                <div class="bg-[#14110f] border border-white/5 p-6 rounded-xl flex items-center justify-between">
                                    <div class="flex items-center gap-4">
                                        <div class="w-16 h-16 rounded-full bg-slate-800 border-4 border-slate-700 flex items-center justify-center animate-spin-slow">
                                            <div class="w-2 h-10 bg-slate-600 rounded-full" />
                                        </div>
                                        <div>
                                            <h3 class="text-xs font-black text-white/80 uppercase">Now Spinning</h3>
                                            <p class="text-sm text-cyan-400 font-mono">Masayoshi Takanaka - Blue Lagoon</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button class="p-3 bg-amber-500 text-black rounded-full"><Icon name="Play" fill="currentColor" /></button>
                                    </div>
                                </div>
                            </div>

                            <div class="md:col-span-4 flex flex-col gap-6">
                                <div class="bg-[#24201d] border border-white/10 p-5 rounded-xl">
                                    <h3 class="text-[10px] font-black text-amber-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <Icon name="Shield" className="w-3 h-3" /> Status
                                    </h3>
                                    <div class="space-y-3 font-mono text-xs">
                                        <div class="flex justify-between"><span>Reactor</span><span class="text-green-500">STABLE</span></div>
                                        <div class="flex justify-between"><span>Forge</span><span class="text-cyan-400">ACTIVE</span></div>
                                    </div>
                                </div>
                                <div class="bg-black/60 rounded-xl p-5 flex-1 border border-white/5 font-mono text-[10px]">
                                    <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest mb-4">Oracle Telemetry</h3>
                                    <div class="space-y-2">
                                        {logs.map((log, i) => (
                                            <div key={i} class={i === 0 ? 'text-cyan-400' : 'text-white/20'}>&gt; {log}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
